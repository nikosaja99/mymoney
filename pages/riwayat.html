<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyMoney - Riwayat</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 pb-24">

  <div class="max-w-md mx-auto p-4 flex flex-col gap-4">

    <!-- HEADER -->
    <div>
      <h1 class="text-2xl font-bold">Riwayat Keuangan</h1>
      <p class="text-sm text-slate-500">Pantau pemasukan & pengeluaran</p>
    </div>

    <!-- SUMMARY -->
    <div class="grid grid-cols-2 gap-3">

      <div class="bg-emerald-50 p-4 rounded-2xl">
        <p class="text-xs text-slate-500">Total Masuk</p>
        <h2 id="totalMasuk" class="text-lg font-bold text-emerald-600">Rp 0</h2>
      </div>

      <div class="bg-red-50 p-4 rounded-2xl">
        <p class="text-xs text-slate-500">Total Keluar</p>
        <h2 id="totalKeluar" class="text-lg font-bold text-red-500">Rp 0</h2>
      </div>

    </div>

    <!-- FILTER -->
    <div class="bg-white p-4 rounded-2xl shadow flex flex-col gap-3">

      <!-- QUICK FILTER -->
      <div class="flex gap-2">
        <button onclick="setFilter('hari')" class="px-3 py-2 bg-slate-100 rounded-lg text-sm">
          Hari Ini
        </button>
      </div>

      <!-- DATE FILTER -->
      <input
        type="date"
        id="filterTanggal"
        class="border p-2 rounded-lg text-sm"
        onchange="setFilterTanggal()"
      >

      <!-- MONTH FILTER -->
      <input
        type="month"
        id="filterBulan"
        class="border p-2 rounded-lg text-sm"
        onchange="setFilterBulan()"
      >

    </div>

    <!-- LIST RIWAYAT -->
    <div id="listRiwayat" class="flex flex-col gap-3"></div>

  </div>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- SCRIPTS -->
  <script src="../js/storage.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/riwayat.js"></script>
  <script src="../js/component-loader.js"></script>

</body>
</html>
