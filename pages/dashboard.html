<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMoney - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24 antialiased">

    <div class="max-w-md mx-auto min-h-screen px-5 pt-6 flex flex-col gap-6">

        <div class="flex items-center justify-between">
            <div>
                <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Selamat Datang</p>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight mt-0.5">
                    Halo, <span id="namaUser" class="text-blue-600">Pengguna</span> ✨
                </h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-semibold text-sm border-2 border-white shadow-sm">
                U
            </div>
        </div>

        <div class="relative overflow-hidden bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-3xl shadow-xl shadow-blue-100 p-6">
            <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
            <div class="absolute -right-2 -top-10 w-24 h-24 bg-white/10 rounded-full blur-lg"></div>
            
            <p class="text-white/80 text-xs font-medium tracking-wide uppercase">
                Total Saldo Saat Ini
            </p>
            <h2 id="saldo" class="text-3xl font-extrabold mt-2 tracking-tight">
                Rp 0
            </h2>
            
            <div class="mt-6 pt-4 border-t border-white/10 flex justify-between items-center text-xs text-white/70">
                <span>Status Akun: Aktif</span>
                <span class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block animate-pulse"></span> Terpantau Aman
                </span>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider px-1">Ringkasan Keuangan</h3>

            <div class="bg-white rounded-2xl border border-slate-100 p-4 flex items-center gap-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center text-xl text-emerald-600">
                    🛡️
                </div>
                <div class="flex-1">
                    <p class="text-slate-400 text-xs font-medium">Batas Aman Hari Ini</p>
                    <h4 id="batasAman" class="text-base font-bold text-slate-800 mt-0.5">
                        Rp 0<span class="text-xs font-normal text-slate-400"> / hari</span>
                    </h4>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                
                <div class="bg-white rounded-2xl border border-slate-100 p-4 flex flex-col gap-3 shadow-sm">
                    <div class="w-9 h-9 rounded-lg bg-amber-50 flex items-center justify-center text-lg">
                        ⏳
                    </div>
                    <div>
                        <p class="text-slate-400 text-[11px] font-medium leading-tight">Dana Berikutnya</p>
                        <h4 id="hariTersisa" class="text-base font-bold text-slate-800 mt-1">
                            0 Hari Lagi
                        </h4>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-100 p-4 flex flex-col gap-3 shadow-sm">
                    <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center text-lg">
                        💰
                    </div>
                    <div>
                        <p class="text-slate-400 text-[11px] font-medium leading-tight">Estimasi Masuk</p>
                        <h4 id="jumlahDanaBerikutnya" class="text-base font-bold text-slate-800 mt-1 truncate">
                            Rp 0
                        </h4>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div id="navbar"></div>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/dashboard.js"></script>
<script src="../js/component-loader.js"></script>
</body>
</html>
