<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMoney - Transaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-28 antialiased">

    <div class="max-w-md mx-auto px-5 pt-6 flex flex-col gap-6">
        
        <div>
            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Catatan Keuangan</p>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight mt-0.5">
                Tambah Transaksi 💸
            </h1>
        </div>

        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col gap-4">
            
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Jenis Transaksi</label>
                <div class="relative">
                    <select id="jenis" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl appearance-none focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium text-slate-700">
                        <option value="masuk">💰 Pemasukan (Income)</option>
                        <option value="keluar">💸 Pengeluaran (Expense)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                        ▼
                    </div>
                </div>
            </div>

            <div id="kategoriWrapper" class="flex flex-col gap-1.5 hidden">

  <label class="text-xs font-semibold text-slate-500 ml-1">
    Kategori Pengeluaran
  </label>

  <select id="kategori"
    class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl">

    <option value="makanan">🍔 Makanan</option>
    <option value="barang">🛍️ Barang</option>
    <option value="transport">🚗 Transport</option>
    <option value="hiburan">🎮 Hiburan</option>
    <option value="lainnya">📦 Lainnya</option>

  </select>

</div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Deskripsi / Judul</label>
                <input id="judul" type="text" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all placeholder:text-slate-400 font-medium" placeholder="Contoh: Gaji Bulanan, Makan Siang">
            </div>


            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Jumlah Uang (Rp)</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-sm font-bold text-slate-400">Rp</span>
                    <input id="jumlah" type="number" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 pl-10 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-bold text-slate-800" placeholder="0">
                </div>
            </div>

            <button onclick="submitTransaksi()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-3.5 rounded-xl font-semibold text-sm shadow-md shadow-blue-100 hover:opacity-95 active:scale-[0.98] transition-all mt-2">
                Simpan Transaksi
            </button>

        </div>

        <div class="flex flex-col gap-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider px-1">Riwayat Terbaru</h3>
            
            <div id="listTransaksi" class="flex flex-col gap-3">
                </div>
        </div>

    </div>

    <div id="navbar"></div>

    <script src="../js/storage.js"></script>
    <script src="../js/transaksi.js"></script>
    <script src="../js/component-loader.js"></script>

</body>
</html>
