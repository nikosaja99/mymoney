<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMoney - Pengaturan Awal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md mx-auto px-5 py-6">

        <div id="welcomeScreen" class="flex flex-col items-center text-center py-10 transition-all duration-500">
            <div class="relative w-28 h-28 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl shadow-xl shadow-blue-100 flex items-center justify-center text-5xl mb-8 animate-bounce">
                <div class="absolute -right-2 -bottom-2 w-10 h-10 bg-white/10 rounded-full blur-sm"></div>
                💰
            </div>

            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                MyMoney
            </h1>
            <p class="text-slate-400 text-sm font-medium mt-2 max-w-[280px]">
                Asisten finansial pribadi untuk memantau pengeluaran dan meraih target impianmu.
            </p>

            <button onclick="bukaFormPendaftaran()" class="w-full mt-12 bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 rounded-2xl font-semibold text-sm shadow-lg shadow-blue-100 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Masuk ke Aplikasi 🚀
            </button>
        </div>

        <div id="formScreen" class="hidden bg-white p-6 rounded-3xl border border-slate-100 shadow-xl shadow-slate-100/50 flex flex-col gap-4 opacity-0 transition-all duration-500 translate-y-4">
            
            <div class="text-center pb-2 border-b border-slate-100">
                <h2 class="text-xl font-bold text-slate-900 tracking-tight">Lengkapi Profil</h2>
                <p class="text-xs font-medium text-slate-400 mt-1">Sesuaikan data keuangan dasar Anda untuk memulai</p>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Nama Lengkap</label>
                <input id="nama" type="text" placeholder="Masukkan nama Anda" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Profesi</label>
                <div class="relative">
                    <select id="profesi" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl appearance-none focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium text-slate-700">
                        <option value="">Pilih Profesi</option>
                        <option>Mahasiswa</option>
                        <option>Fresh Graduate</option>
                        <option>Karyawan</option>
                        <option>Freelancer</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400 text-xs">▼</div>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Sumber Dana Utama</label>
                <div class="relative">
                    <select id="sumberDana" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl appearance-none focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium text-slate-700">
                        <option value="">Pilih Sumber Dana</option>
                        <option>Orang Tua</option>
                        <option>Beasiswa</option>
                        <option>Gaji</option>
                        <option>Freelance</option>
                        <option>Bisnis</option>
                        <option>Lainnya</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400 text-xs">▼</div>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Tanggal Dana Berikutnya Masuk</label>
                <input id="tanggalDana" type="date" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium text-slate-700">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Jumlah Dana Berikutnya (Rp)</label>
                <input id="jumlahDana" type="number" placeholder="Contoh: 2500000" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-bold text-slate-800">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Total Saldo Saat Ini (Rp)</label>
                <input id="saldo" type="number" placeholder="Contoh: 1800000" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-bold text-emerald-600">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-500 ml-1">Jam Pengingat Evaluasi Harian</label>
                <input id="jamNotifikasi" type="time" class="w-full bg-slate-50 border border-slate-200 text-sm p-3.5 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-medium text-slate-700">
            </div>

            <button onclick="simpanProfil()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-3.5 rounded-xl font-semibold text-sm shadow-md shadow-blue-100 hover:opacity-95 active:scale-[0.98] transition-all mt-2">
                Mulai Mengelola Keuangan
            </button>
        </div>

    </div>

    <script>
        function bukaFormPendaftaran() {
            const welcome = document.getElementById('welcomeScreen');
            const form = document.getElementById('formScreen');

            // Menyembunyikan Splash Screen dengan animasi menghilang
            welcome.classList.add('opacity-0', 'scale-95');
            
            setTimeout(() => {
                welcome.classList.add('hidden');
                
                // Memunculkan Form Setup dengan animasi naik halus
                form.classList.remove('hidden');
                setTimeout(() => {
                    form.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
            }, 400);
        }
    </script>

    <script src="../js/storage.js"></script>
    <script src="../js/setup.js"></script>

</body>
</html>
